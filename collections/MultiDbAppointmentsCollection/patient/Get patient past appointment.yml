info:
  name: Get patient past appointment
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/appointments/past/ALB1/1001?page=0&size=10"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: "0"
      type: query
    - name: size
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
