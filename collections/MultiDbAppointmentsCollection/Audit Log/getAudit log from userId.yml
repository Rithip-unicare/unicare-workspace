info:
  name: getAudit log from userId
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/audit-log/6?page=0&size=10"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: "0"
      type: query
    - name: size
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
